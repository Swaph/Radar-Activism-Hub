<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --ink: #15263e;
      --muted: #4a5d78;
      --line: #d5dfec;
      --paper: #ffffff;
      --bg: #f4f8fe;
      --primary: #008cff;
      --ok: #13745a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    .viewer-container {
      max-width: 900px;
      margin: 20px auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 4px;
      box-shadow: 0 4px 12px rgba(21, 38, 62, 0.05);
      padding: 40px;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--ink);
    }

    .nav-bar h1 {
      margin: 0;
      font-size: 1.3rem;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    a.nav-btn {
      display: inline-block;
      padding: 8px 16px;
      text-decoration: none;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      font-weight: bold;
      background: var(--primary);
      color: white;
      border-radius: 3px;
      transition: all 0.2s;
    }

    a.nav-btn:hover {
      background: #0066cc;
      transform: translateY(-1px);
    }

    #content {
      text-align: left;
    }

    #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
      font-family: "IBM Plex Mono", monospace;
      color: var(--primary);
      font-style: normal;
      text-align: left;
      font-weight: 700;
      margin-top: 20px;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    #content h1 {
      font-size: 1.8rem;
      text-transform: uppercase;
      border-bottom: 2px solid var(--line);
      padding-bottom: 12px;
    }

    #content h2 {
      font-size: 1.4rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    #content h3 {
      font-size: 1.15rem;
      color: var(--ink);
    }

    #content h4, #content h5, #content h6 {
      font-size: 1rem;
      color: var(--ink);
    }

    #content p {
      line-height: 1.7;
      margin: 12px 0;
      text-align: left;
      font-style: normal;
    }

    #content ul, #content ol {
      margin: 16px 0;
      padding-left: 32px;
      line-height: 1.7;
      text-align: left;
    }

    #content li {
      margin-bottom: 8px;
      text-align: left;
      font-style: normal;
    }

    #content em, #content i {
      font-style: italic;
    }

    #content strong, #content b {
      font-weight: 700;
    }

    #content code {
      background: #f5f7fa;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.9rem;
      color: var(--ink);
    }

    #content pre {
      background: #f5f7fa;
      border: 1px solid var(--line);
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      line-height: 1.5;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      margin: 16px 0;
    }

    #content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      color: var(--ink);
    }

    #content blockquote {
      border-left: 4px solid var(--primary);
      padding-left: 16px;
      margin: 16px 0;
      margin-left: 0;
      margin-right: 0;
      color: var(--muted);
      font-style: italic;
    }

    #content a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid var(--primary);
      transition: all 0.2s;
    }

    #content a:hover {
      background-color: #eef5fd;
    }

    #content table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      border: 1px solid var(--line);
    }

    #content table th {
      background: #f0f4f9;
      border: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      font-weight: 700;
      color: var(--ink);
    }

    #content table td {
      border: 1px solid var(--line);
      padding: 10px;
      text-align: left;
    }

    #content table tr:nth-child(even) {
      background: #fafbfc;
    }

    #content strong {
      font-weight: 700;
      color: var(--ink);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-style: italic;
    }

    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 16px;
      border-radius: 4px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="viewer-container">
    <div class="nav-bar">
      <h1 id="doc-title">Loading...</h1>
      <a href="../index.html" class="nav-btn">← BACK</a>
    </div>
    <div id="content" class="loading">Loading document...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const title = params.get('title') || 'Documentation';

    if (!file) {
      document.getElementById('content').innerHTML = '<div class="error">Error: No file specified. Use ?file=FILENAME.md</div>';
    } else {
      fetch(`${file}`)
        .then(response => {
          if (!response.ok) throw new Error(`Failed to load ${file}: ${response.status}`);
          return response.text();
        })
        .then(markdown => {
          document.getElementById('doc-title').textContent = title;
          document.title = `${title} | Radar Documentation`;
          document.getElementById('content').innerHTML = marked.parse(markdown);
        })
        .catch(error => {
          document.getElementById('content').innerHTML = `<div class="error">Error loading document: ${error.message}</div>`;
        });
    }
  </script>
</body>
</html>
